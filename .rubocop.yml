inherit_from: .rubocop_todo.yml

inherit_gem:
  defra_ruby_style:
    - default.yml

plugins:
  - rubocop-factory_bot
  - rubocop-rspec
  - rubocop-rspec_rails

AllCops:
  TargetRubyVersion: 3.2
  Exclude:
    # schema.rb is auto-generated by Rails:
    - spec/dummy/db/schema.rb
    # Avoid pulling in gems for GitHub setup-ruby@v1 action:
    - vendor/bundle/**/*

# Some methods need to be lengthy
Metrics/MethodLength:
  Exclude:
    - app/models/concerns/waste_exemptions_engine/can_copy_data_from_registration.rb

# Some files need long blocks for clarity
Metrics/BlockLength:
  Exclude:
    - app/models/concerns/waste_exemptions_engine/can_use_back_office_edit_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_front_office_edit_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_new_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_renewing_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_new_charged_registration_workflow.rb
    - config/routes.rb

# Some methods need to be lengthy
Metrics/ClassLength:
  Exclude:
    - app/presenters/waste_exemptions_engine/data_overview_presenter.rb
    - app/presenters/waste_exemptions_engine/registration_details_presenter.rb
    - app/models/waste_exemptions_engine/transient_registration.rb
    - app/services/waste_exemptions_engine/registration_completion_service.rb
    - app/presenters/waste_exemptions_engine/exemption_costs_presenter.rb
    - app/controllers/waste_exemptions_engine/govpay_forms_controller.rb

# Some modules need to be lengthy, especially specs
Metrics/ModuleLength:
  Exclude:
    - app/models/concerns/waste_exemptions_engine/can_use_back_office_edit_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_new_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_renewing_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_use_new_charged_registration_workflow.rb
    - app/models/concerns/waste_exemptions_engine/can_copy_data_from_registration.rb
    - spec/**/*

# Bad cop: Not all methods returning a boolean are predicates.
Naming/PredicatePrefix:
  Enabled: false

# Notify uses address_line_1 etc naming convention and we want to align with it
Naming/VariableNumber:
  Enabled: false

# Bad cop: Not all methods which return a boolean are predicates
Naming/PredicateMethod:
  Enabled: false

# Allow "because" as a prefix:
RSpec/ContextWording:
  Prefixes:
    - because
    - when
    - with
    - without
    - if
    - unless
    - for

# Sometimes examples more than 5 lines long are easier to review
RSpec/ExampleLength:
  Max: 15
  Exclude:
    - spec/presenters/waste_exemptions_engine/registration_details_presenter_spec.rb
    - spec/services/waste_exemptions_engine/confirmation_pdf_generator_service_spec.rb
    - spec/services/waste_exemptions_engine/registration_completion_service_spec.rb
    - spec/support/shared_examples/requests/post_form.rb

# Simply changing these variables to "let" results in many cases in an error because "let"
# variables are not available on an example group, only in the scope of an example.
# TODO: Enable this cop and refactor the relevant 137 instances.
RSpec/LeakyLocalVariable:
  Enabled: false

# Some examples need to have multiple expectations
RSpec/MultipleExpectations:
  Exclude:
    - spec/support/shared_examples/requests/post_form.rb
    - spec/support/shared_examples/requests/unable_to_post_form.rb

# Some complex specs require more memoized helpers than the default of 5
RSpec/MultipleMemoizedHelpers:
  Max: 10

# Nesting can help reduce overall complexity - raise from default of 3
RSpec/NestedGroups:
  Max: 5

# This cop incorrectly flags the sequence of parameters passed to a shared_example:
RSpec/SortMetadata:
  Exclude:
    - "spec/**/*"

RSpec/Output:
  Exclude:
    - spec/rails_helper.rb
    - spec/dummy/**/*

Style/OneClassPerFile:
  # Legacy spec exclusions: these files predate current style rules.
  Exclude:
    - spec/models/concerns/waste_exemptions_engine/can_have_registration_attributes_spec.rb
    - spec/models/concerns/waste_exemptions_engine/can_have_view_certificate_token_spec.rb
    - spec/models/concerns/waste_exemptions_engine/can_sort_exemptions_spec.rb
    - spec/validators/waste_exemptions_engine/address_validator_spec.rb
    - spec/validators/waste_exemptions_engine/manual_address_validator_spec.rb
    - spec/validators/waste_exemptions_engine/matching_email_validator_spec.rb
    - spec/validators/waste_exemptions_engine/operator_name_validator_spec.rb
    - spec/validators/waste_exemptions_engine/optional_email_form_validator_spec.rb
    - spec/validators/waste_exemptions_engine/optional_email_validator_spec.rb
    - spec/validators/waste_exemptions_engine/payment_type_validator_spec.rb
    - spec/validators/waste_exemptions_engine/person_name_validator_spec.rb
    - spec/validators/waste_exemptions_engine/postcode_validator_spec.rb
    - spec/validators/waste_exemptions_engine/reusing_address_for_site_address_validator_spec.rb
    - spec/validators/waste_exemptions_engine/site_description_validator_spec.rb
    - spec/validators/waste_exemptions_engine/start_validator_spec.rb
    - spec/validators/waste_exemptions_engine/waste_activities_validator_spec.rb
    - spec/validators/waste_exemptions_engine/exemptions_validator_spec.rb
    - spec/validators/waste_exemptions_engine/registration_lookup_validator_spec.rb
