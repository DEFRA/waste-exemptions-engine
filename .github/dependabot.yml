version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  versioning-strategy: lockfile-only
  cooldown:
    default-days: 7
  ignore:
  - dependency-name: aasm
    versions:
    - "< 6"
    - ">= 5.a"
  - dependency-name: rails
    versions:
    - "< 6"
    - ">= 5.a"
